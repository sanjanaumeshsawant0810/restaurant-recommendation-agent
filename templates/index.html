<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Food Finder</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel">
        <div class="account-bar">
          <div class="account-badge">
            Signed in as {{ current_user.name }}
          </div>
          <form method="post" action="/logout">
            <button class="account-logout" type="submit">Log out</button>
          </form>
        </div>
        <div class="chat-layout">
          <button id="chat-drawer-toggle" class="chat-drawer-toggle" type="button" aria-expanded="false" aria-controls="session-sidebar">
            Chats
          </button>
          <div id="chat-drawer-backdrop" class="chat-drawer-backdrop"></div>
          <aside id="session-sidebar" class="session-sidebar">
            <div class="session-sidebar-header">
              <div class="session-sidebar-heading">
                <p class="eyebrow">Chats</p>
                <button id="chat-drawer-close" class="chat-drawer-close" type="button" aria-label="Close chats">
                  Close
                </button>
              </div>
              <button id="new-chat-button" class="new-chat-button" type="button">New Chat</button>
            </div>
            <div id="session-list" class="session-list" aria-label="Saved chats"></div>
          </aside>

          <div class="chat-main">
            <header class="hero">
              <p class="eyebrow hero-title">InstaDine</p>
              <h1>Find a place that fits what you want to eat.</h1>
              <p class="subcopy">
                Tell me what you want to eat, when you want to eat, where you are,
                and how far you're willing to travel for it.
              </p>
            </header>

            <div id="chat-log" class="chat-log" aria-live="polite"></div>

            <form id="chat-form" class="chat-form">
              <textarea
                id="chat-input"
                name="message"
                rows="1"
                placeholder="I want pizza near downtown New Brunswick and I can drive 15 minutes."
                required
              ></textarea>
              <button id="send-button" type="submit">Send</button>
            </form>
          </div>
        </div>
      </section>

      <aside class="map-panel">
        <div class="map-card">
          <div class="map-copy">
            <p class="eyebrow map-title">Live Map</p>
            <p id="map-status" class="map-status">
              The map will update after the backend finds places.
            </p>
          </div>
          <div id="map"></div>
        </div>

        <div class="insight-card">
          <div class="insight-header">
            <div class="map-copy">
              <p class="eyebrow">Agent Trace</p>
            </div>
            <button id="trace-toggle" class="trace-toggle" type="button" aria-expanded="false" aria-controls="agent-trace">
              Show trace
            </button>
          </div>
          <div id="agent-trace" class="trace-list trace-list-hidden"></div>
        </div>
      </aside>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/app.js"></script>
  </body>
</html>
